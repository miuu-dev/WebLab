name: Deploy Multiple Projects

on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Dashboard Ventas
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dashboardVentas
          target-folder: dashboardVentas

      - name: Deploy Mi Portfolio
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: miPortfolio
          target-folder: miPortfolio

      - name: Deploy Spotify UI Clone
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: spotifyUIclone
          target-folder: spotifyUIclone
